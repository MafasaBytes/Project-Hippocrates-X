services:

  db:
    image: pgvector/pgvector:pg16
    container_name: hippocrates-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: hippocrates
      POSTGRES_PASSWORD: hippocrates_dev
      POSTGRES_DB: hippocrates
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hippocrates -d hippocrates"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: .
    container_name: hippocrates-backend
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://hippocrates:hippocrates_dev@db:5432/hippocrates
    ports:
      - "8000:8000"
    volumes:
      - uploads:/app/data/uploads
      - hf_cache:/root/.cache/huggingface
    depends_on:
      db:
        condition: service_healthy

  # Smoke-test runner (only starts with `docker compose --profile test up smoke-test`)
  smoke-test:
    image: python:3.11-slim
    container_name: hippocrates-smoke-test
    profiles: ["test"]
    volumes:
      - ./scripts:/scripts:ro
    depends_on:
      backend:
        condition: service_started
    entrypoint: >
      sh -c "sleep 10 && python /scripts/smoke_test.py http://backend:8000"

volumes:
  pgdata:
  uploads:
  hf_cache:
